name: validation
on: [push, pull_request]
# Permission forced by repo-level setting; only elevate on job-level
permissions:
  contents: read
  # packages: read
env:
  GO111MODULE: "on"
  PROJECTNAME: "watermarkpodautoscaler"
  GO_VERSION: 1.24
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
        id: go
      - name: Install required packages
        uses: mstksg/get-package@4eda30bb5c6ac62c0f3921dd5884b6ef8fc89ab2 # v1.0.0
        with:
          apt-get: mercurial jq build-essential
      - name: Check out code into the Go module directory
        uses: actions/checkout@50fbc622fc4ef5163becd7fab6573eac35f8462e # v1.2.0
      - name: Install tools
        run: |
          make install-tools
      - name: Run build
        run: |
          make manager
      - name: Run unit/control plane tests (fake cluster)
        run: |
          make test
  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s:
          - v1.14.10
          - v1.16.9
          - v1.18.4
          - v1.21.1
    steps:
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
        id: go
      - name: Install required packages
        uses: mstksg/get-package@4eda30bb5c6ac62c0f3921dd5884b6ef8fc89ab2 # v1.0.0
        with:
          apt-get: mercurial jq build-essential
      - name: Check out code into the Go module directory
        uses: actions/checkout@50fbc622fc4ef5163becd7fab6573eac35f8462e # v1.2.0
      - name: Install tools
        run: |
          make install-tools
      - name: Setup kind for e2e - kube ${{ matrix.k8s }}
        uses: helm/kind-action@94729529f85113b88f4f819c17ce61382e6d8478 # v1.2.0
        with:
          config: test/cluster-kind.yaml
          cluster_name: wpa-e2e-test
      - name: Run e2e tests - kube ${{ matrix.k8s }}
        run: |
          export PATH=$PATH:$(pwd)/bin
          kubectl cluster-info --context kind-wpa-e2e-test
          kubectl get pods -n kube-system
          make e2e
